name: Release Plugins

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH-Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.FILAMAN_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.FILAMAN_SSH_HOST }}
          SSH_USER: ${{ secrets.FILAMAN_SSH_USER }}
          SSH_PATH: ${{ secrets.FILAMAN_SSH_PLUGIN_PATH }}
        run: |
          set -euo pipefail

          # SSH-Key einrichten
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          for PLUGIN_JSON in $(find . -maxdepth 2 -name "plugin.json" -not -path "./.git/*"); do
            PLUGIN_DIR=$(dirname "$PLUGIN_JSON")
            FOLDER_NAME=$(basename "$PLUGIN_DIR")
            VERSION=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' "$PLUGIN_JSON" | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')

            if [ -z "$VERSION" ]; then
              echo "⚠️  Keine Version in $PLUGIN_JSON, überspringe."
              continue
            fi

            ZIP_NAME="${FOLDER_NAME}-${VERSION}.zip"

            echo "📦 Erstelle $ZIP_NAME ..."
            zip -r "$ZIP_NAME" "$FOLDER_NAME" -x "$FOLDER_NAME/__pycache__/*" "$FOLDER_NAME/*.pyc"

            echo "📤 Upload $ZIP_NAME per SCP ..."
            scp -o StrictHostKeyChecking=no "$ZIP_NAME" "${SSH_USER}@${SSH_HOST}:${SSH_PATH}/${ZIP_NAME}"

            echo "✅ $ZIP_NAME auf ${SSH_HOST}:${SSH_PATH}/ hochgeladen."
          done

          # Aufräumen
          rm -f ~/.ssh/id_rsa

          echo "🎉 Fertig!"
